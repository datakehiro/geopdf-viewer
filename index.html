<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoPDF ビューア</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoPDF">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.css">
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #0f0f17;
      color: #e0e0f0;
      overflow: hidden;
    }

    /* ── 地図（全画面） ── */
    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    /* ── 上部ツールバー ── */
    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      display: flex;
      gap: 8px;
    }

    .tool-btn {
      background: #1a1a2eee;
      border: 1px solid #3a3a6a;
      color: #e0e0f0;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:active { background: #6d28d9cc; }

    /* ── 下部パネル ── */
    #panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: #1a1a2ef5;
      border-top: 1px solid #2e2e5e;
      border-radius: 16px 16px 0 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transform: translateY(calc(100% - 52px));
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 75dvh;
      display: flex;
      flex-direction: column;
    }
    #panel.open {
      transform: translateY(0);
    }

    /* パネルのハンドル */
    #panelHandle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #panelHandle::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 8px;
      width: 36px;
      height: 4px;
      background: #3a3a6a;
      border-radius: 2px;
    }

    #panelTitle {
      font-size: 13px;
      font-weight: 600;
      color: #a78bfa;
    }

    #panelCount {
      font-size: 12px;
      color: #4b4b7a;
    }

    /* パネルのコンテンツ */
    #panelContent {
      overflow-y: auto;
      padding: 0 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── PDF カード ── */
    .pdf-card {
      background: #212140;
      border: 1px solid #2e2e5e;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pdf-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pdf-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pdf-name {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c4c4e8;
    }

    .pdf-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: #2e2e5e;
      border: none;
      color: #a0a0c8;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      min-height: 36px;
      display: flex;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .icon-btn:active { background: #3a3a70; }
    .icon-btn.active { background: #6d28d9; color: #f0e8ff; }
    .icon-btn.del:active { background: #7f1d1d; color: #fca5a5; }

    .pdf-coords {
      font-size: 10px;
      color: #4b4b7a;
      font-feature-settings: 'tnum';
    }

    .pdf-opacity-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pdf-opacity-row label { font-size: 11px; color: #4b4b7a; white-space: nowrap; }
    .opacity-slider {
      flex: 1;
      accent-color: #7c3aed;
    }
    .opacity-val { font-size: 11px; color: #6b6b9a; width: 32px; text-align: right; }

    .pdf-status {
      font-size: 12px;
      color: #818cf8;
      padding: 4px 0;
    }
    .pdf-status.error { color: #f87171; white-space: pre-wrap; }

    /* ── ドロップオーバーレイ ── */
    #dropOverlay {
      position: fixed;
      inset: 0;
      background: rgba(109, 40, 217, 0.2);
      border: 3px dashed #7c3aed;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #a78bfa;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    #dropOverlay.show { display: flex; }

    /* ── Leaflet 調整 ── */
    .leaflet-control-zoom { display: none; }  /* モバイルではピンチズームを使う */
    .leaflet-control-layers { border-radius: 8px !important; }

    /* ── 現在地ボタン ── */
    #locBtn.locating { opacity: 0.6; animation: loc-pulse 0.8s infinite alternate; }
    #locBtn.tracking { background: #065f46cc !important; color: #6ee7b7; border-color: #6ee7b7; }
    @keyframes loc-pulse { from { opacity: 0.6; } to { opacity: 1; } }

    /* ── 地図中央の十字線 ── */
    #mapCrosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 800;
    }
    #mapCrosshair::before,
    #mapCrosshair::after {
      content: '';
      position: absolute;
      background: rgba(249,115,22,0.85);
      border-radius: 2px;
    }
    #mapCrosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #mapCrosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }

    /* ── 記録セクション ── */
    .rec-section {
      background: #212140;
      border: 1px solid #2e2e5e;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rec-title {
      font-size: 12px;
      font-weight: 600;
      color: #a78bfa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4b4b7a;
      flex-shrink: 0;
    }
    .rec-dot.active {
      background: #f87171;
      animation: gps-pulse 1.2s infinite;
    }
    .rec-stats {
      font-size: 11px;
      color: #6b6b9a;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .rec-stat-val { color: #c4c4e8; font-weight: 600; font-feature-settings: 'tnum'; }
    .rec-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .rec-btn {
      flex: 1;
      background: #2e2e5e;
      border: none;
      color: #a0a0c8;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      min-height: 38px;
      -webkit-tap-highlight-color: transparent;
    }
    .rec-btn:active { background: #3a3a70; }
    .rec-btn.start  { background: #7f1d1d; color: #fca5a5; }
    .rec-btn.stop   { background: #065f46; color: #6ee7b7; }
    .rec-btn.export { background: #1e3a5f; color: #93c5fd; }
    .rec-btn:disabled { opacity: 0.35; cursor: default; }
    .wp-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }
    .wp-item {
      font-size: 11px;
      color: #9090b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .wp-num {
      background: #f97316;
      color: #fff;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── 現在地マーカー（脈動するドット） ── */
    .gps-dot {
      width: 16px; height: 16px;
      background: #3b82f6;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(59,130,246,0.5);
      animation: gps-pulse 2s infinite;
    }
    @keyframes gps-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0   rgba(59,130,246,0); }
    }

    /* ── デスクトップ時のレイアウト ── */
    @media (min-width: 768px) {
      body { flex-direction: row; }

      #map { flex: 1; height: 100dvh; }

      #toolbar { display: none; }

      #panel {
        position: relative;
        transform: none !important;
        width: 300px;
        min-width: 300px;
        max-height: 100dvh;
        border-radius: 0;
        border-top: none;
        border-right: 1px solid #2e2e5e;
        order: -1;
        flex-direction: column;
      }

      #panelHandle {
        cursor: default;
        border-bottom: 1px solid #2e2e5e;
      }
      #panelHandle::before { display: none; }

      #panelContent { padding: 12px 12px 24px; }

      .leaflet-control-zoom { display: block; }
    }
  </style>
</head>
<body>

<!-- モバイル用ツールバー（地図の上に重ねる） -->
<div id="toolbar">
  <button class="tool-btn" id="addBtn">＋ PDF</button>
  <button class="tool-btn" id="locBtn" style="padding:4px;width:44px;justify-content:center;">
    <svg width="32" height="32" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="17" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <line x1="20" y1="4"  x2="20" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="4"  y1="20" x2="36" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="3" fill="currentColor"/>
    </svg>
  </button>
  <button class="tool-btn" id="northBtn" style="padding:4px;width:44px;justify-content:center;" title="北向きにリセット">
    <svg id="northArrow" width="36" height="36" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="12" fill="none" stroke="#3a3a6a" stroke-width="1.5"/>
      <text x="13" y="7.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#a78bfa" font-family="sans-serif">N</text>
      <polygon points="13,9 16.5,14 13,12.5 9.5,14" fill="#a78bfa"/>
      <polygon points="13,19 16.5,14 13,15.5 9.5,14" fill="#4b4b7a"/>
      <circle cx="13" cy="13" r="1.5" fill="#e0e0f0"/>
    </svg>
  </button>
  <button class="tool-btn" id="wpQuickBtn">
    <svg width="18" height="24" viewBox="148 70 216 360" xmlns="http://www.w3.org/2000/svg">
      <path d="M256 80 C196 80 148 128 148 188 C148 268 256 420 256 420 C256 420 364 268 364 188 C364 128 316 80 256 80Z" fill="#7c3aed"/>
      <circle cx="256" cy="188" r="48" fill="#e0e0f0"/>
    </svg>
  </button>
  <button class="tool-btn" id="panelToggleBtn">一覧 ▼</button>
</div>

<!-- 地図 -->
<div id="map"></div>

<!-- 地図中央の十字線 -->
<div id="mapCrosshair"></div>

<!-- 下部スライドパネル（モバイル）/ 左サイドバー（デスクトップ） -->
<div id="panel">
  <div id="panelHandle" id="panelHandleInner">
    <span id="panelTitle">GeoPDF ビューア v1.23</span>
    <span id="panelCount">0 件</span>
  </div>
  <div id="panelContent">
    <!-- PDF 追加ボタン（デスクトップ用） -->
    <button class="tool-btn" id="addBtnDesktop" style="width:100%; justify-content:center;">
      ＋ GeoPDF を追加
    </button>
    <div id="pdfList"></div>

    <!-- トラック記録 -->
    <div class="rec-section">
      <div class="rec-title">
        <span class="rec-dot" id="recDot"></span>
        トラック記録
      </div>
      <div class="rec-stats">
        <span>距離</span><span class="rec-stat-val" id="recDist">0.0 m</span>
        <span>記録点数</span><span class="rec-stat-val" id="recPtCount">0</span>
      </div>
      <div class="rec-btns">
        <button class="rec-btn start" id="recBtn">● 記録開始</button>
        <button class="rec-btn" id="recClearBtn" disabled>破棄</button>
      </div>
      <div class="wp-list" id="trackList"></div>
    </div>

    <!-- ポイント記録（リスト表示のみ。追加はツールバーの📍ボタン） -->
    <div class="rec-section">
      <div class="rec-title">
        📍 ポイント記録
        <span style="font-size:10px;color:#6b6b9a;font-weight:400">（地図中央に追加）</span>
      </div>
      <div class="wp-list" id="wpList"></div>
      <div class="rec-btns">
        <button class="rec-btn" id="wpClearBtn" disabled>クリア</button>
      </div>
    </div>

    <!-- GPX出力 -->
    <div class="rec-btns" style="padding: 0 2px">
      <button class="rec-btn export" id="gpxBtn" disabled style="flex:1; min-height:42px">
        GPXで保存（トラック＋ポイント）
      </button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
<div id="dropOverlay">GeoPDF をドロップ</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
<script type="module">
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

  // ── Leaflet 地図 ──────────────────────────────────────────────────
  const map = L.map('map', {
    zoomControl: true,
    bounceAtZoomLimits: false,
    minZoom: 2,
    rotate: true,
    touchRotate: true,
    rotateControl: false,
  }).setView([36.412, 137.826], 14);

  const baseLayers = {
    '地理院標準': L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
      maxZoom: 18, maxNativeZoom: 18, attribution: '国土地理院',
    }),
    '地理院写真': L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
      maxZoom: 18, maxNativeZoom: 18, attribution: '国土地理院',
    }),
    'OpenStreetMap': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 22, maxNativeZoom: 19, attribution: '© OpenStreetMap contributors',
    }),
  };
  baseLayers['地理院標準'].addTo(map);
  L.control.layers(baseLayers, {}, { position: 'topright' }).addTo(map);

  // ── パネル開閉（モバイル） ────────────────────────────────────────
  const panel = document.getElementById('panel');
  const panelHandle = document.getElementById('panelHandle');
  const panelToggleBtn = document.getElementById('panelToggleBtn');

  function togglePanel() {
    const isOpen = panel.classList.toggle('open');
    panelToggleBtn.textContent = isOpen ? '一覧 ▼' : '一覧 ▲';
  }
  panelHandle.addEventListener('click', togglePanel);
  panelToggleBtn.addEventListener('click', togglePanel);

  // 起動時はパネルを開いておく（PDF未読み込みでも記録ボタンがすぐ使える）
  panel.classList.add('open');
  panelToggleBtn.textContent = '一覧 ▼';



  // ── ファイル入力 ──────────────────────────────────────────────────
  const fileInput = document.getElementById('fileInput');
  const openPicker = () => fileInput.click();

  document.getElementById('addBtn').addEventListener('click', openPicker);
  document.getElementById('addBtnDesktop').addEventListener('click', openPicker);

  fileInput.addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(loadGeoPDF);
    e.target.value = '';
  });

  // ── ドラッグ＆ドロップ ───────────────────────────────────────────
  const dropOverlay = document.getElementById('dropOverlay');
  document.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.add('show'); });
  document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) dropOverlay.classList.remove('show'); });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dropOverlay.classList.remove('show');
    Array.from(e.dataTransfer.files)
      .filter(f => f.name.toLowerCase().endsWith('.pdf'))
      .forEach(loadGeoPDF);
  });

  // ── カラーパレット ────────────────────────────────────────────────
  const COLORS = ['#818cf8','#34d399','#fb923c','#f472b6','#38bdf8','#a3e635','#fbbf24','#e879f9'];
  let colorIdx = 0;
  let pdfCount = 0;

  function updateCount() {
    document.getElementById('panelCount').textContent = pdfCount + ' 件';
  }

  const pdfStore = new Map();

  // ── IndexedDB（PDF永続化） ───────────────────────────────────────
  let _db = null;
  async function openDB() {
    if (_db) return _db;
    _db = await new Promise((res, rej) => {
      const r = indexedDB.open('geopdf-store', 1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('pdfs', { keyPath: 'id' });
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    });
    return _db;
  }
  function dbPut(val) {
    try { const tx = _db.transaction('pdfs', 'readwrite'); tx.objectStore('pdfs').put(val); } catch(_) {}
  }
  function dbDel(id) {
    try { const tx = _db.transaction('pdfs', 'readwrite'); tx.objectStore('pdfs').delete(id); } catch(_) {}
  }
  function dbGetAll() {
    return new Promise((res, rej) => {
      const tx  = _db.transaction('pdfs', 'readonly');
      const req = tx.objectStore('pdfs').getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  }

  // ── localStorage（ポイント・トラック永続化） ──────────────────────
  function saveWaypoints() {
    try {
      localStorage.setItem('geopdf-wp', JSON.stringify(
        waypoints.map(w => ({ lat: w.lat, lon: w.lon, name: w.name, time: w.time.toISOString() }))
      ));
    } catch(_) {}
  }
  function saveTracks() {
    try {
      localStorage.setItem('geopdf-track', JSON.stringify(
        tracks.map(t => ({
          id: t.id,
          points: t.points.map(p => ({ lat: p.lat, lon: p.lon, time: p.time.toISOString() })),
          startTime: t.startTime.toISOString(),
          endTime: t.endTime ? t.endTime.toISOString() : null,
        }))
      ));
    } catch(_) {}
  }

  // ── GeoPDF の読み込みメイン処理 ──────────────────────────────────
  async function loadGeoPDF(file, opts = {}) {
    const { id = Date.now(), color = COLORS[colorIdx++ % COLORS.length], savedBuffer = null, savedOpacity = 0.75 } = opts;
    const card = createCard(file.name, color);
    if (!savedBuffer) {
      panel.classList.add('open');
      panelToggleBtn.textContent = '一覧 ▼';
    }

    try {
      const buffer = savedBuffer ?? await file.arrayBuffer();

      card.setStatus('座標を解析中...');
      const geo = extractGPTS(buffer);
      if (!geo) {
        card.setError('位置情報（GPTS）が見つかりません。\nGeoPDF 形式ではない可能性があります。');
        if (savedBuffer) dbDel(id);
        return;
      }

      card.setStatus('レンダリング中...');
      const { url: dataUrl, jpegBytes } = await renderPDFPage(buffer, (msg) => card.setStatus(msg));

      const bounds = L.latLngBounds(
        [geo.minLat, geo.minLon],
        [geo.maxLat, geo.maxLon]
      );
      const overlay = L.imageOverlay(dataUrl, bounds, { opacity: savedOpacity }).addTo(map);
      if (!savedBuffer) map.fitBounds(bounds, { padding: [40, 40] });

      pdfCount++;
      updateCount();

      const meta = { id, buffer, name: file.name, color, geo, opacity: savedOpacity };
      pdfStore.set(id, meta);
      if (!savedBuffer) dbPut(meta);

      card.setReady({ overlay, bounds, geo, jpegBytes, name: file.name, dbId: id, initOpacity: savedOpacity });

    } catch (err) {
      card.setError('読み込みエラー: ' + err.message);
      console.error(err);
    }
  }

  // ── GPTS 抽出 ────────────────────────────────────────────────────
  function extractGPTS(buffer) {
    const text = new TextDecoder('latin1').decode(new Uint8Array(buffer));
    const match = text.match(/\/GPTS\s*\[([^\]]+)\]/);
    if (!match) return null;

    const vals = match[1].trim().split(/\s+/).map(Number);
    if (vals.length < 8 || vals.some(isNaN)) return null;

    const lats = vals.filter((_, i) => i % 2 === 0);
    const lons = vals.filter((_, i) => i % 2 === 1);

    return {
      minLat: Math.min(...lats), maxLat: Math.max(...lats),
      minLon: Math.min(...lons), maxLon: Math.max(...lons),
      centerLat: (Math.min(...lats) + Math.max(...lats)) / 2,
      centerLon: (Math.min(...lons) + Math.max(...lons)) / 2,
    };
  }

  // ── 画像取得 ──────────────────────────────────────────────────────
  // PC  → PDF.js でフル描画（ラスター＋ベクターすべて反映）
  // iOS → 組み込みJPEGを直接抽出（メモリ安全。ベクター地物が別レイヤーの
  //        PDFでは地物が欠落する場合があります）
  async function renderPDFPage(buffer, onProgress) {
    const isMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isMobile) {
      return renderMobile(buffer, onProgress);
    } else {
      return renderDesktop(buffer, onProgress);
    }
  }

  // PC：PDF.jsでレンダリング（ベクター地物も含めて正確に描画）
  async function renderDesktop(buffer, onProgress) {
    onProgress?.('レンダリング中...');
    const MAX_PX = 2048;

    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise;
    const page = await pdf.getPage(1);
    const vp0  = page.getViewport({ scale: 1.0 });
    const scale = Math.min(MAX_PX / vp0.width, MAX_PX / vp0.height);
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width  = Math.round(viewport.width);
    canvas.height = Math.round(viewport.height);
    onProgress?.(`レンダリング中… (${canvas.width}×${canvas.height}px)`);

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    const url = canvas.toDataURL('image/jpeg', 0.88);
    const jpegBytes = await new Promise(resolve =>
      canvas.toBlob(b => b.arrayBuffer().then(ab => resolve(new Uint8Array(ab))), 'image/jpeg', 0.88)
    );
    return { url, jpegBytes };
  }

  // iOS：組み込みJPEGを直接取り出す（PDF.jsのメモリ問題を回避）
  async function renderMobile(buffer, onProgress) {
    onProgress?.('画像を抽出中...');
    const jpegBytes = extractEmbeddedJPEGBytes(buffer);

    if (jpegBytes) {
      const url = URL.createObjectURL(new Blob([jpegBytes], { type: 'image/jpeg' }));
      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = () => reject(new Error('JPEG decode failed'));
        img.src = url;
      });
      return { url, jpegBytes };
    }

    // タイル分割PDF：元の解像度（~300 DPI）から段階的にフォールバック
    // 元タイルは 2480×3508px 相当 → scale ≈ 4.16。メモリ不足時は縮小して再試行
    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise;
    const page = await pdf.getPage(1);
    const vp0  = page.getViewport({ scale: 1.0 });
    const nativeMaxPx = Math.round(Math.max(vp0.width, vp0.height) * (300 / 72));

    for (const maxPx of [nativeMaxPx, 2048, 1536, 1024]) {
      const scale    = Math.min(maxPx / vp0.width, maxPx / vp0.height);
      const viewport = page.getViewport({ scale });
      const w = Math.round(viewport.width);
      const h = Math.round(viewport.height);
      onProgress?.(`レンダリング中… (${w}×${h}px)`);

      const canvas = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      if (!ctx) { canvas.width = 1; canvas.height = 1; continue; }

      try {
        await page.render({ canvasContext: ctx, viewport }).promise;
        const url = canvas.toDataURL('image/jpeg', 0.88);
        const jpegBytes2 = await new Promise(resolve =>
          canvas.toBlob(b => b.arrayBuffer().then(ab => resolve(new Uint8Array(ab))), 'image/jpeg', 0.88)
        );
        return { url, jpegBytes: jpegBytes2 };
      } catch (_) {
        canvas.width = 1; canvas.height = 1; // メモリ解放
      }
    }
    throw new Error('レンダリング失敗：メモリ不足の可能性があります');
  }

  // PDFバイナリの単一JPEGをUint8Arrayとして返す
  // 複数のJPEGストリームがある場合（タイル分割PDF）はnullを返してPDF.jsにフォールバック
  function extractEmbeddedJPEGBytes(buffer) {
    const bytes = new Uint8Array(buffer);
    let start = -1;
    let count = 0;
    for (let i = 0; i < bytes.length - 1; i++) {
      if (bytes[i] === 0xFF && bytes[i + 1] === 0xD8) {
        if (count === 0) start = i;
        count++;
        if (count > 1) return null; // 複数JPEG → PDF.jsで正しく合成する
      }
    }
    if (start === -1) return null;
    let end = -1;
    for (let i = bytes.length - 1; i > start + 1; i--) {
      if (bytes[i - 1] === 0xFF && bytes[i] === 0xD9) { end = i; break; }
    }
    if (end === -1) return null;
    return bytes.slice(start, end + 1);
  }

  // ── KMZ エクスポート ──────────────────────────────────────────────
  // KMZ = KML + JPEG を ZIP 圧縮したもの。
  // GoogleマップにドラッグするだけでGeoPDF画像をオーバーレイ表示できる。
  async function exportKMZ(name, geo, jpegBytes) {
    const baseName = name.replace(/\.pdf$/i, '');
    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <GroundOverlay>
    <name>${esc(baseName)}</name>
    <Icon><href>image.jpg</href></Icon>
    <LatLonBox>
      <north>${geo.maxLat}</north>
      <south>${geo.minLat}</south>
      <east>${geo.maxLon}</east>
      <west>${geo.minLon}</west>
    </LatLonBox>
  </GroundOverlay>
</kml>`;

    const zip = new JSZip();
    zip.file('doc.kml', kml);
    zip.file('image.jpg', jpegBytes);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = baseName + '.kmz';
    a.click();
  }

  // ── カード UI ────────────────────────────────────────────────────
  function createCard(name, color) {
    const list = document.getElementById('pdfList');
    const card = document.createElement('div');
    card.className = 'pdf-card';
    card.innerHTML = `
      <div class="pdf-card-header">
        <span class="pdf-dot" style="background:${color}"></span>
        <span class="pdf-name" title="${esc(name)}">${esc(name)}</span>
      </div>
      <span class="pdf-status">読み込み中...</span>
    `;
    list.appendChild(card);

    const statusEl = card.querySelector('.pdf-status');

    return {
      setStatus(msg) { statusEl.textContent = msg; statusEl.className = 'pdf-status'; },
      setError(msg)  { statusEl.textContent = msg; statusEl.className = 'pdf-status error'; },
      setReady({ overlay, bounds, geo, jpegBytes, name, dbId, initOpacity = 0.75 }) {
        const pct = Math.round(initOpacity * 100);
        statusEl.remove();
        card.insertAdjacentHTML('beforeend', `
          <div class="pdf-actions">
            <button class="icon-btn active" data-role="vis">表示</button>
            <button class="icon-btn" data-role="fit">移動</button>
            <button class="icon-btn" data-role="kmz">KMZ</button>
            <button class="icon-btn del" data-role="del">✕</button>
          </div>
          <div class="pdf-coords">
            ${geo.centerLat.toFixed(5)}°N, ${geo.centerLon.toFixed(5)}°E
          </div>
          <div class="pdf-opacity-row">
            <label>透過</label>
            <input type="range" class="opacity-slider" min="0" max="100" value="${pct}">
            <span class="opacity-val">${pct}%</span>
          </div>
        `);

        const visBtn = card.querySelector('[data-role="vis"]');
        const slider = card.querySelector('.opacity-slider');
        const opVal  = card.querySelector('.opacity-val');

        card.querySelector('[data-role="fit"]').addEventListener('click', () =>
          map.fitBounds(bounds, { padding: [40, 40] })
        );

        card.querySelector('[data-role="kmz"]').addEventListener('click', () =>
          exportKMZ(name, geo, jpegBytes)
        );

        card.querySelector('[data-role="del"]').addEventListener('click', () => {
          map.removeLayer(overlay);
          card.remove();
          pdfCount--;
          updateCount();
          pdfStore.delete(dbId);
          dbDel(dbId);
        });

        visBtn.addEventListener('click', () => {
          if (map.hasLayer(overlay)) {
            map.removeLayer(overlay);
            visBtn.textContent = '非表示';
            visBtn.classList.remove('active');
          } else {
            overlay.addTo(map);
            visBtn.textContent = '表示';
            visBtn.classList.add('active');
          }
        });

        slider.addEventListener('input', () => {
          const v = parseInt(slider.value);
          overlay.setOpacity(v / 100);
          opVal.textContent = v + '%';
          const m = pdfStore.get(dbId);
          if (m) { m.opacity = v / 100; dbPut(m); }
        });
      }
    };
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── トラック・ポイント記録 ────────────────────────────────────────
  let recWatchId   = null;
  let recPoints    = [];
  let waypoints    = [];
  let recLine      = null;
  let wpMarkers    = [];
  let recStartTime = null;
  let tracks       = [];
  let trackLines   = [];

  const recBtn      = document.getElementById('recBtn');
  const wpQuickBtn  = document.getElementById('wpQuickBtn');
  const gpxBtn      = document.getElementById('gpxBtn');
  const recClearBtn = document.getElementById('recClearBtn');
  const wpClearBtn  = document.getElementById('wpClearBtn');
  const recDot      = document.getElementById('recDot');
  const recDist     = document.getElementById('recDist');
  const recPtCount  = document.getElementById('recPtCount');
  const wpList      = document.getElementById('wpList');

  function haversine(a, b) {
    const R = 6371000, r = Math.PI / 180;
    const dLat = (b.lat - a.lat) * r, dLon = (b.lon - a.lon) * r;
    const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(s));
  }

  function calcDist(points) {
    let d = 0;
    for (let i = 1; i < points.length; i++) d += haversine(points[i-1], points[i]);
    return d;
  }
  function distStr(d) { return d >= 1000 ? (d/1000).toFixed(2)+' km' : Math.round(d)+' m'; }

  function updateRecStats() {
    const d = calcDist(recPoints);
    recDist.textContent = distStr(d);
    recPtCount.textContent = recPoints.length;
  }

  function updateGpxBtn() {
    gpxBtn.disabled = tracks.length === 0 && waypoints.length === 0;
  }

  function renderTrackList() {
    const list = document.getElementById('trackList');
    list.innerHTML = '';
    tracks.forEach((t, i) => {
      const d = calcDist(t.points);
      const dt = t.startTime;
      const label = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const item = document.createElement('div');
      item.className = 'wp-item';
      item.innerHTML = `
        <span class="wp-num">${i+1}</span>
        <span style="flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
        <span style="color:#4b4b7a;font-size:10px;white-space:nowrap">${distStr(d)}</span>
        <button class="icon-btn del" style="margin-left:4px;padding:2px 7px;min-height:24px;font-size:11px;flex-shrink:0">✕</button>
      `;
      item.querySelector('button').addEventListener('click', () => deleteTrack(i));
      list.appendChild(item);
    });
  }

  function deleteTrack(idx) {
    map.removeLayer(trackLines[idx]);
    tracks.splice(idx, 1);
    trackLines.splice(idx, 1);
    renderTrackList();
    updateGpxBtn();
    saveTracks();
  }

  // ── トラック記録開始/停止 ──
  recBtn.addEventListener('click', () => {
    if (recWatchId !== null) {
      navigator.geolocation.clearWatch(recWatchId);
      recWatchId = null;
      recBtn.textContent = '● 記録開始';
      recBtn.className = 'rec-btn start';
      recDot.classList.remove('active');
      if (recPoints.length > 0) {
        tracks.push({ id: Date.now(), points: [...recPoints], startTime: recStartTime, endTime: new Date() });
        trackLines.push(recLine);
        recLine = null;
        recPoints = [];
        recClearBtn.disabled = true;
        updateRecStats();
        renderTrackList();
        updateGpxBtn();
        saveTracks();
      }
    } else {
      if (!navigator.geolocation) { alert('位置情報に対応していません'); return; }
      recStartTime = new Date();
      recBtn.textContent = '■ 記録停止';
      recBtn.className = 'rec-btn stop';
      recDot.classList.add('active');

      recWatchId = navigator.geolocation.watchPosition(pos => {
        const pt = { lat: pos.coords.latitude, lon: pos.coords.longitude, time: new Date() };
        recPoints.push(pt);
        const latlngs = recPoints.map(p => [p.lat, p.lon]);
        if (!recLine) {
          recLine = L.polyline(latlngs, { color: '#f97316', weight: 3, opacity: 0.85 }).addTo(map);
        } else {
          recLine.setLatLngs(latlngs);
        }
        updateRecStats();
        recClearBtn.disabled = false;
      }, () => {}, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 });
    }
  });

  // 録中トラックを破棄
  recClearBtn.addEventListener('click', () => {
    if (!confirm('録中のトラックを破棄しますか？')) return;
    recPoints = [];
    if (recLine) { map.removeLayer(recLine); recLine = null; }
    updateRecStats();
    recClearBtn.disabled = true;
  });

  // ── ポイント追加（トラック記録と独立） ──
  function makeWpIcon(num) {
    return L.divIcon({
      className: '',
      html: `<div style="background:#f97316;color:#fff;border-radius:50%;width:22px;height:22px;
             display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;
             border:2px solid #fff;box-shadow:0 1px 4px #0005">${num}</div>`,
      iconSize: [22,22], iconAnchor: [11,11],
    });
  }

  function renderWpList() {
    wpList.innerHTML = '';
    waypoints.forEach((wp, i) => {
      const item = document.createElement('div');
      item.className = 'wp-item';
      item.innerHTML = `
        <span class="wp-num">${i + 1}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(wp.name)}</span>
        <span style="color:#4b4b7a;font-size:10px;white-space:nowrap">${wp.lat.toFixed(5)},${wp.lon.toFixed(5)}</span>
        <button class="icon-btn del" style="margin-left:4px;padding:2px 7px;min-height:24px;font-size:11px;flex-shrink:0">✕</button>
      `;
      item.querySelector('button').addEventListener('click', () => deleteWaypoint(i));
      wpList.appendChild(item);
    });
  }

  function deleteWaypoint(idx) {
    map.removeLayer(wpMarkers[idx]);
    waypoints.splice(idx, 1);
    wpMarkers.splice(idx, 1);
    wpMarkers.forEach((m, i) => m.setIcon(makeWpIcon(i + 1)));
    renderWpList();
    wpClearBtn.disabled = waypoints.length === 0;
    updateGpxBtn();
    saveWaypoints();
  }

  function addWaypoint(lat, lon, savedName = null, savedTime = null) {
    const num  = waypoints.length + 1;
    const name = savedName !== null ? savedName
      : (prompt('ポイント名', 'ポイント ' + num) ?? ('ポイント ' + num)) || ('ポイント ' + num);
    const wp   = { lat, lon, name, time: savedTime ?? new Date() };
    waypoints.push(wp);
    wpMarkers.push(L.marker([lat, lon], { icon: makeWpIcon(num) }).bindPopup(wp.name).addTo(map));
    renderWpList();
    wpClearBtn.disabled = false;
    gpxBtn.disabled = false;
    if (savedName === null) saveWaypoints();
  }

  // ツールバーの📍ボタン → 地図の中央座標にポイント追加
  wpQuickBtn.addEventListener('click', () => {
    const center = map.getCenter();
    addWaypoint(center.lat, center.lng);
  });

  // ポイントクリア
  wpClearBtn.addEventListener('click', () => {
    if (!confirm('ポイントをクリアしますか？')) return;
    waypoints = [];
    wpMarkers.forEach(m => map.removeLayer(m)); wpMarkers = [];
    wpList.innerHTML = '';
    wpClearBtn.disabled = true;
    updateGpxBtn();
    saveWaypoints();
  });

  // ── GPX出力 ──
  gpxBtn.addEventListener('click', async () => {
    const now = new Date(), iso = t => t.toISOString();
    let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GeoPDF Viewer" xmlns="http://www.topografix.com/GPX/1/1">\n`;
    waypoints.forEach(w => {
      gpx += `  <wpt lat="${w.lat}" lon="${w.lon}"><name>${esc(w.name)}</name><time>${iso(w.time)}</time></wpt>\n`;
    });
    tracks.forEach((t, i) => {
      gpx += `  <trk><name>Track ${i+1} ${iso(t.startTime)}</name><trkseg>\n`;
      t.points.forEach(p => { gpx += `    <trkpt lat="${p.lat}" lon="${p.lon}"><time>${iso(p.time)}</time></trkpt>\n`; });
      gpx += `  </trkseg></trk>\n`;
    });
    gpx += `</gpx>`;
    const filename = `track_${now.toISOString().slice(0,10)}.gpx`;
    const blob = new Blob([gpx], { type: 'application/gpx+xml' });
    // Web Share API が使えればネイティブ共有シートで開く（iOS対応）
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: blob.type })] })) {
      try {
        await navigator.share({ files: [new File([blob], filename, { type: blob.type })], title: filename });
        return;
      } catch (e) {
        if (e.name === 'AbortError') return; // ユーザーがキャンセル
      }
    }
    // フォールバック：ダウンロードリンク
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  });

  // ── 北向きリセットボタン ──────────────────────────────────────────
  const northArrow = document.getElementById('northArrow');
  document.getElementById('northBtn').addEventListener('click', () => map.setBearing(0));
  map.on('rotate', () => {
    northArrow.style.transform = `rotate(${map.getBearing()}deg)`;
  });

  // ── 現在地表示 ────────────────────────────────────────────────────
  let gpsMarker = null;
  let gpsAccCircle = null;
  let gpsWatchId = null;
  const locBtn = document.getElementById('locBtn');

  locBtn.addEventListener('click', () => {
    if (gpsWatchId !== null) {
      // 追跡中 → 停止
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
      if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
      if (gpsAccCircle) { map.removeLayer(gpsAccCircle); gpsAccCircle = null; }
      locBtn.classList.remove('tracking', 'locating');
      return;
    }

    if (!navigator.geolocation) {
      alert('このブラウザは位置情報に対応していません');
      return;
    }

    locBtn.classList.add('locating');

    gpsWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        const latlng = [lat, lng];

        // マーカー生成（初回）or 移動
        if (!gpsMarker) {
          const icon = L.divIcon({
            className: '',
            html: '<div class="gps-dot"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8],
          });
          gpsMarker = L.marker(latlng, { icon, zIndexOffset: 1000 }).addTo(map);
          gpsAccCircle = L.circle(latlng, {
            radius: accuracy,
            color: '#3b82f6',
            fillColor: '#3b82f6',
            fillOpacity: 0.1,
            weight: 1,
          }).addTo(map);
          map.setView(latlng, Math.max(map.getZoom(), 15));
        } else {
          gpsMarker.setLatLng(latlng);
          gpsAccCircle.setLatLng(latlng);
          gpsAccCircle.setRadius(accuracy);
          map.panTo(latlng);
        }

        locBtn.classList.remove('locating');
        locBtn.classList.add('tracking');
      },
      (err) => {
        locBtn.classList.remove('tracking', 'locating');
        gpsWatchId = null;
        const msg = err.code === 1 ? '位置情報の許可が必要です' : '位置情報を取得できませんでした';
        alert(msg);
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  });

  // ── 起動時データ復元 ─────────────────────────────────────────────
  async function restoreAll() {
    await openDB();

    try {
      const saved = JSON.parse(localStorage.getItem('geopdf-wp') || '[]');
      saved.forEach(w => addWaypoint(w.lat, w.lon, w.name, new Date(w.time)));
    } catch(_) {}

    try {
      const raw = JSON.parse(localStorage.getItem('geopdf-track') || '[]');
      const arr = Array.isArray(raw) ? raw : (raw?.points?.length ? [raw] : []);
      for (const t of arr) {
        const points = t.points.map(p => ({ lat: p.lat, lon: p.lon, time: new Date(p.time) }));
        if (!points.length) continue;
        const line = L.polyline(points.map(p => [p.lat, p.lon]),
          { color: '#f97316', weight: 3, opacity: 0.85 }).addTo(map);
        tracks.push({ id: t.id ?? Date.now(), points, startTime: new Date(t.startTime ?? t.time ?? Date.now()), endTime: t.endTime ? new Date(t.endTime) : null });
        trackLines.push(line);
      }
      if (tracks.length) { renderTrackList(); updateGpxBtn(); }
    } catch(_) {}

    try {
      const pdfs = await dbGetAll();
      for (const pdf of pdfs) {
        const file = new File([pdf.buffer], pdf.name, { type: 'application/pdf' });
        await loadGeoPDF(file, { id: pdf.id, color: pdf.color, savedBuffer: pdf.buffer, savedOpacity: pdf.opacity ?? 0.75 });
      }
      if (pdfs.length) {
        colorIdx = pdfs.length;
        const allLats = pdfs.flatMap(p => [p.geo.minLat, p.geo.maxLat]);
        const allLons = pdfs.flatMap(p => [p.geo.minLon, p.geo.maxLon]);
        map.fitBounds(L.latLngBounds(
          [Math.min(...allLats), Math.min(...allLons)],
          [Math.max(...allLats), Math.max(...allLons)]
        ), { padding: [40, 40] });
      }
    } catch(_) {}
  }
  restoreAll();

  // ── PWA：Service Worker 登録 ──────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
    let swRefreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swRefreshing) return;
      swRefreshing = true;
      location.reload();
    });
  }

  // ── PWA：共有シートから受け取ったPDFを処理（iOS Share Target）────
  if (location.search.includes('share=1')) {
    history.replaceState({}, '', location.pathname);
    (async () => {
      try {
        const cache = await caches.open('geopdf-share');
        const res   = await cache.match('pending');
        if (res) {
          const filename = decodeURIComponent(res.headers.get('X-Filename') || 'shared.pdf');
          const buf  = await res.arrayBuffer();
          const file = new File([buf], filename, { type: 'application/pdf' });
          await cache.delete('pending');
          loadGeoPDF(file);
        }
      } catch (_) {}
    })();
  }

  // ── PWA：ファイルハンドラー（Windows/Mac の Chrome/Edge でPDFを関連付け）
  if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async params => {
      for (const handle of params.files) {
        const file = await handle.getFile();
        if (file.name.toLowerCase().endsWith('.pdf')) loadGeoPDF(file);
      }
    });
  }
</script>
</body>
</html>
